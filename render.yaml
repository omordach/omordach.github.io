services:
  - type: web
    name: mordach-com
    runtime: node
    buildCommand: npm ci && npm run build
    startCommand: node .output/server/index.mjs
    envVars:
      - key: NITRO_PRESET
        value: node-server
      - key: NODE_VERSION
        value: "20"
      - key: NODE_ENV
        value: production
